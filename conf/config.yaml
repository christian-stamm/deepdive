defaults:
  - environment: dev
  - _self_

runtime:
  seed: 42
  num_workers: 4
  pin_memory: true

data:
  rootdir: data/datasets
  transform_name: normalize_mnist
  batch_size: 2048

model:
  layer_depth: 3
  kernel_depth: 64

training:
  epochs: 10

optimizer:
  learning_rate: 0.0005
  weight_decay: 0.0
  scheduler:
    step_size: 5
    gamma: 0.1

checkpoint:
  rootdir: data/checkpoints
  interval_epochs: 1
  restore: last

logging:
  level: INFO
  log_every_n_steps: 10
